{% extends 'movies/base.html' %}

{% block content %}
<div class="auth-box">
    <h2 class="auth-title">Вход</h2>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 16px;">
            <label class="form-label-dark">Логин</label>
            <input type="text" name="username" class="form-input-dark">
        </div>
        <div style="margin-bottom: 24px;">
            <label class="form-label-dark">Пароль</label>
            <input type="password" name="password" class="form-input-dark">
        </div>
        {% if form.errors %}
        <div class="form-error" style="margin-bottom: 16px;">Неверный логин или пароль</div>
        {% endif %}
        <button type="submit" class="btn-submit">Войти</button>
    </form>
    <div class="auth-link-wrap">
        Нет аккаунта? <a href="/register/">Зарегистрироваться</a>
    </div>
</div>
{% endblock %}
