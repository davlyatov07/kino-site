{% extends 'movies/base.html' %}

{% block content %}
<div class="auth-box">
    <h2 class="auth-title">Регистрация</h2>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div style="margin-bottom: 16px;">
            <label class="form-label-dark">{{ field.label }}</label>
            <input type="{{ field.field.widget.input_type }}"
                   name="{{ field.html_name }}"
                   class="form-input-dark">
            {% if field.errors %}
            <div class="form-error">{{ field.errors|join:", " }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn-submit" style="margin-top: 8px;">Зарегистрироваться</button>
    </form>
    <div class="auth-link-wrap">
        Уже есть аккаунт? <a href="/accounts/login/">Войти</a>
    </div>
</div>
{% endblock %}
