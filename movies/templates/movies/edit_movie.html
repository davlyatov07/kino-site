{% extends 'movies/base.html' %}

{% block content %}
<div style="padding: 20px 40px;">
    <h2 class="mb-4">Редактировать фильм</h2>
    <form method="POST" style="max-width: 500px;">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Название</label>
            <input type="text" name="title" value="{{ movie.title }}" class="form-control bg-dark text-white border-secondary" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Год</label>
            <input type="number" name="year" value="{{ movie.year }}" class="form-control bg-dark text-white border-secondary" min="1900" max="2025" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Режиссёр</label>
            <input type="text" name="director" value="{{ movie.director }}" class="form-control bg-dark text-white border-secondary" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Жанр</label>
            <input type="text" name="genre" value="{{ movie.genre }}" class="form-control bg-dark text-white border-secondary" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Оценка (1-10)</label>
            <input type="number" name="rating" value="{{ movie.rating|default:'' }}" class="form-control bg-dark text-white border-secondary" min="1" max="10" step="0.1">
        </div>
      <div class="mb-3">
    <label class="form-label">Трейлер (YouTube embed ссылка)</label>
    <input type="text" name="trailer_url" value="{{ movie.trailer_url|default:'' }}" class="form-control bg-dark text-white border-secondary" placeholder="https://www.youtube.com/embed/...">
</div>
<div class="mb-3">
    <label class="form-label">Полный фильм (embed ссылка)</label>
    <input type="text" name="video_url" value="{{ movie.video_url|default:'' }}" class="form-control bg-dark text-white border-secondary" placeholder="https://www.youtube.com/embed/...">
</div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/" class="btn btn-outline-secondary ms-2">Отмена</a>
    </form>
</div>
{% endblock %}
